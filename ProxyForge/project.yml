name: ProxyForge
options:
  bundleIdPrefix: com.proxyforge
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

targets:
  ProxyForge:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: ProxyForge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.proxyforge.ProxyForge
        PRODUCT_NAME: ProxyForge
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: NO
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_CFBundleDisplayName: ProxyForge
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
